baseURL: "https://bragic.cloud/"
languageCode: en-us
title: bragic
theme: PaperMod
outputs:
  home:
    - HTML
    - RSS

pagination:
  pagerSize: 10

params:
  description: "Terraform tutorials, Azure infrastructure, and cloud engineering notes"
  author:
    name: "bragic"

  profileMode:
    enabled: true
    title: "bragic"
    subtitle: "engineer. builder. occasional blogger."
    imageUrl: ""
    imageTitle: ""

    buttons:
      - name: Posts
        url: /posts/
      - name: Projects
        url: /projects/
      - name: About
        url: "https://resume.bradgravesen.com"

  socialIcons:
    - name: rss
      url: "index.xml"
    - name: github
      url: "https://github.com/bragic/"
    - name: linkedin
      url: "https://www.linkedin.com/in/bgravesen"

  ShowRssButtonInSectionTermList: true
  ShowFullTextinRSS: true
  showReadingTime: true
  showShareButtons: false
  showPostNavLinks: true
  showBreadCrumbs: true
  showCodeCopyButtons: true

  defaultTheme: auto

menu:
  main:
    - name: Posts
      url: /posts/
      weight: 1
    - name: Projects
      url: /projects/
      weight: 2
    - name: About
      url: "https://resume.bradgravesen.com"
      weight: 3

